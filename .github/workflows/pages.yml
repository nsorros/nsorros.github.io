name: deploy-pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage public dir
        run: |
          mkdir -p public
          rsync -a \
            --exclude=.git \
            --exclude=.github \
            --exclude=public \
            --exclude=README.md \
            --exclude=.gitignore \
            ./ public/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
